<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Street.NET | Dashboard Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0b0c0e; --panel: #161719; --accent: #00ffcc; --text: #ffffff; --border: #2a2c30; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
    
    .nav-bar { background: rgba(22, 23, 25, 0.8); backdrop-filter: blur(15px); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .tabs { display: flex; gap: 10px; }
    .tab-btn { background: #222; color: #aaa; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
    .tab-btn.active { background: var(--accent); color: #000; font-weight: 600; }

    .container { padding: 40px; max-width: 1500px; margin: 0 auto; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 25px; }
    
    /* TABLE MODERN */
    .table-container { overflow-x: auto; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; min-width: 1100px; }
    th { text-align: left; color: #666; font-size: 11px; text-transform: uppercase; padding: 15px; border-bottom: 1px solid var(--border); }
    td { padding: 8px; border-bottom: 1px solid #222; }
    td input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: #fff; font-size: 13px; outline: none; }
    td input:focus { border-color: var(--accent); }
    
    .footer-bar { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 10px; z-index: 999; }
    .btn-save { background: var(--accent); color: #000; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 20px rgba(0,255,204,0.2); }
  </style>
</head>
<body>

<div class="nav-bar">
  <div style="font-weight: 800; font-size: 18px;">STREET<span style="color:var(--accent)">.NET</span> ADMIN</div>
  <div class="tabs" id="tabMenu">
    <button class="tab-btn active" onclick="switchTab('ssrp')">SSRP</button>
    <button class="tab-btn" onclick="switchTab('vrp')">VRP</button>
    <button class="tab-btn" onclick="switchTab('jgrp')">JGRP</button>
  </div>
</div>

<div class="container" id="mainContainer"></div>

<div class="footer-bar">
  <input type="password" id="adminPin" placeholder="GitHub Token" style="background:#161719; border:1px solid var(--border); color:#fff; padding:10px 20px; border-radius:12px; width:220px;">
  <button class="btn-save" onclick="simpanKeGitHub()">SAVE CHANGES 🚀</button>
</div>

<script>
// --- CONFIG ---
const GITHUB = { token: "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", owner: "flxdrmaa", repo: "Stree.NET", path: "data.json" };
const webs = ['ssrp', 'vrp', 'jgrp'];
let currentSha = "";

// 1. GENERATE TABEL OTOMATIS
function renderUI() {
  const container = document.getElementById('mainContainer');
  let html = "";
  webs.forEach(w => {
    let rows = "";
    for(let j=1; j<=11; j++) {
      rows += `<tr>
        <td style="width:50px; font-weight:bold; color:var(--accent);">${j}</td>
        <td><input type="text" id="${w}_owner_${j}"></td>
        <td><input type="text" id="${w}_logo_${j}"></td>
        <td><input type="text" id="${w}_track_${j}"></td>
        <td><input type="text" id="${w}_name_${j}"></td>
        <td><input type="text" id="${w}_length_${j}"></td>
        <td><input type="text" id="${w}_laps_${j}"></td>
        <td><input type="text" id="${w}_record_${j}"></td>
        <td><input type="text" id="${w}_cash_${j}"></td>
      </tr>`;
    }
    html += `<div id="content_${w}" class="tab-content" style="${w==='ssrp'?'':'display:none'}">
      <div class="card">
        <label style="color:#666; font-size:12px;">Main Map URL</label>
        <input type="text" id="${w}_mainMap" style="width:100%; background:#000; border:1px solid #333; color:#fff; padding:12px; border-radius:8px; margin-top:5px;">
      </div>
      <div class="card">
        <div class="table-container"><table><thead><tr>
          <th>ID</th><th>Owner</th><th>Logo</th><th>Track</th><th>Name</th><th>Length</th><th>Laps</th><th>Record</th><th>Cash</th>
        </tr></thead><tbody>${rows}</tbody></table></div>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

function switchTab(w) {
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.getElementById('content_'+w).style.display = 'block';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// 2. AUTO-LOAD DATA DARI GITHUB
async function loadData() {
  const res = await fetch(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.path}`, {
    headers: { 'Authorization': `token ${GITHUB.token}` }
  });
  const file = await res.json();
  currentSha = file.sha;
  const data = JSON.parse(atob(file.content));
  
  webs.forEach(w => {
    if(!data[w]) return;
    document.getElementById(`${w}_mainMap`).value = data[w][0].MainMap || "";
    data[w].forEach(r => {
      if(!r.Zone) return;
      document.getElementById(`${w}_owner_${r.Zone}`).value = r.Owner || "";
      document.getElementById(`${w}_logo_${r.Zone}`).value = r.LogoMap || "";
      document.getElementById(`${w}_track_${r.Zone}`).value = r.Track || "";
      document.getElementById(`${w}_name_${r.Zone}`).value = r.Name || "";
      document.getElementById(`${w}_length_${r.Zone}`).value = r.Length || "";
      document.getElementById(`${w}_laps_${r.Zone}`).value = r.Rounds || "";
      document.getElementById(`${w}_record_${r.Zone}`).value = r.Record || "";
      document.getElementById(`${w}_cash_${r.Zone}`).value = r.Cash || "";
    });
  });
}

// 3. FUNGSI SIMPAN
async function simpanKeGitHub() {
  const token = document.getElementById('adminPin').value || GITHUB.token;
  let newData = {};
  webs.forEach(w => {
    newData[w] = [{ MainMap: document.getElementById(`${w}_mainMap`).value }];
    for(let i=1; i<=11; i++) {
      newData[w].push({
        Zone: i, Owner: document.getElementById(`${w}_owner_${i}`).value,
        LogoMap: document.getElementById(`${w}_logo_${i}`).value, Track: document.getElementById(`${w}_track_${i}`).value,
        Name: document.getElementById(`${w}_name_${i}`).value, Length: document.getElementById(`${w}_length_${i}`).value,
        Rounds: document.getElementById(`${w}_laps_${i}`).value, Record: document.getElementById(`${w}_record_${i}`).value,
        Cash: document.getElementById(`${w}_cash_${i}`).value
      });
    }
  });

  const res = await fetch(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.path}`, {
    method: 'PUT',
    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: "Update via Panel", content: btoa(JSON.stringify(newData, null, 2)), sha: currentSha })
  });

  if(res.ok) {
    alert("Berhasil Update! Data sudah masuk ke GitHub.");
    const data = await res.json();
    currentSha = data.content.sha;
  } else { alert("Update Gagal! Cek Token/Koneksi."); }
}

renderUI();
loadData();
</script>
</body>
</html>
