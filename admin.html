<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin Panel - Street.NET</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root { --bg-body: #050505; --bg-card: #0d0d0d; --primary: #00ffcc; --primary-dim: rgba(0, 255, 204, 0.15); --primary-hover: #00cca3; --border: #1f1f1f; --text-main: #f0f0f0; --text-muted: #888; --danger: #ff4757; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0 0 100px 0; font-family: 'Poppins', sans-serif; background-color: var(--bg-body); color: var(--text-main); overflow-x: hidden; }
    ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-track { background: var(--bg-body); } ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; } ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    .header { background: var(--bg-card); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .header h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: 1px;} .header h1 span { color: var(--primary); }
    .tabs { display: flex; gap: 15px; }
    .tab-btn { background: transparent; border: none; color: var(--text-muted); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; font-family: 'Poppins', sans-serif; transition: all 0.3s; font-size: 14px; }
    .tab-btn:hover { color: var(--text-main); background: #1a1a1a; }
    .tab-btn.active { background: var(--primary-dim); color: var(--primary); box-shadow: inset 0 0 0 1px var(--primary); }

    .container { padding: 30px; max-width: 1400px; margin: 0 auto; }
    .tab-content { display: none; animation: fadeUp 0.4s ease forwards; } .tab-content.active { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
    .card-header h3 { margin: 0; font-size: 18px; font-weight: 600; }
    
    .input-group { display: flex; flex-direction: column; gap: 8px; } .input-group label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .input-main { padding: 12px 15px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: #fff; font-family: 'Poppins', sans-serif; transition: all 0.2s; }
    .input-main:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px var(--primary-dim); }

    .table-wrapper { width: 100%; overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1200px; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th { background: #111; color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; position: sticky; top: 0; z-index: 10; }
    td { background: var(--bg-card); } tr:hover td { background: #161616; }
    th:first-child, td:first-child { position: sticky; left: 0; z-index: 11; width: 60px; text-align: center; box-shadow: 2px 0 5px rgba(0,0,0,0.2); }
    th:first-child { background: #111; } td:first-child { background: #0a0a0a; font-weight: bold; color: var(--primary); }
    
    td input { width: 100%; min-width: 140px; padding: 8px 10px; background: transparent; border: 1px solid transparent; border-radius: 6px; color: var(--text-main); font-family: 'Poppins', sans-serif; font-size: 13px; transition: all 0.2s; }
    td input:hover { background: rgba(255,255,255,0.03); border: 1px solid #333; }
    td input:focus { background: #000; border: 1px solid var(--primary); outline: none; box-shadow: 0 0 0 3px var(--primary-dim); }

    .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(13, 13, 13, 0.85); backdrop-filter: blur(12px); padding: 15px 30px; border-top: 1px solid var(--border); display: flex; gap: 20px; align-items: center; justify-content: flex-end; z-index: 999; }
    .action-bar .pin-wrapper { display: flex; align-items: center; gap: 10px; } .action-bar .pin-wrapper span { font-size: 13px; color: var(--text-muted); }
    .action-bar input[type="password"] { width: 200px; padding: 10px 15px; background: #000; border: 1px solid #333; border-radius: 6px; color: #fff; text-align: center; letter-spacing: 2px; }
    .action-bar input[type="password"]:focus { border-color: var(--primary); outline: none; }
    .btn-submit { background: var(--primary); color: #000; border: none; padding: 10px 25px; border-radius: 6px; font-weight: 600; font-family: 'Poppins'; cursor: pointer; font-size: 14px; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .btn-submit:hover { background: var(--primary-hover); transform: translateY(-2px); }

    #toast { position: fixed; bottom: 80px; right: -300px; background: #111; color: #fff; padding: 15px 20px; border-radius: 8px; border-left: 4px solid var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 14px; font-weight: 500; transition: right 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 1000; }
    #toast.show { right: 30px; } #toast.error { border-left-color: var(--danger); }
    #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; color: var(--primary); font-weight: 600; font-size: 18px; letter-spacing: 1px; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,255,204,0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loader"><div class="spinner"></div><span>Menarik Data Database...</span></div>

  <div class="header">
    <h1>Street.NET <span>Panel</span></h1>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('ssrp')">SSRP (Web 1)</button>
      <button class="tab-btn" onclick="switchTab('vrp')">VRP (Web 2)</button>
      <button class="tab-btn" onclick="switchTab('jgrp')">JGRP (Web 3)</button>
    </div>
  </div>

  <div class="container" id="mainContainer">
    <!-- Konten Tab Akan di Generate Otomatis oleh JavaScript -->
  </div>

  <div class="action-bar">
    <div class="pin-wrapper">
      <span>Otorisasi:</span>
      <input type="password" id="adminPin" placeholder="PIN ADMIN">
    </div>
    <button class="btn-submit" onclick="simpanData()" id="btnUpdate">Simpan Perubahan SSRP</button>
  </div>

  <div id="toast">Notifikasi</div>

  <script>
    // MASUKIN LINK GOOGLE APPS SCRIPT LU DI BAWAH INI !!!
    const APPS_SCRIPT_URL = "URL_APPS_SCRIPT_LU_DISINI";

    let activeTab = "ssrp";
    const webList = ["ssrp", "vrp", "jgrp"];

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.innerText = msg; toast.className = type === 'error' ? 'error show' : 'show';
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function switchTab(tabId) {
      activeTab = tabId;
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');
      event.target.classList.add('active');
      document.getElementById('btnUpdate').innerText = "Simpan Perubahan " + tabId.toUpperCase();
    }

    // Fungsi Generate HTML Tabel
    function generateHTML() {
      let html = "";
      webList.forEach((web, index) => {
        let rows = "";
        for(let i = 1; i <= 11; i++) {
          rows += `<tr>
            <td>${i}</td>
            <td><input type="text" id="${web}_owner_${i}"></td>
            <td><input type="text" id="${web}_logoMap_${i}"></td>
            <td><input type="text" id="${web}_track_${i}"></td>
            <td><input type="text" id="${web}_name_${i}"></td>
            <td><input type="text" id="${web}_length_${i}"></td>
            <td><input type="text" id="${web}_rounds_${i}"></td>
            <td><input type="text" id="${web}_record_${i}"></td>
            <td><input type="text" id="${web}_cash_${i}"></td>
          </tr>`;
        }
        html += `
        <div id="tab-${web}" class="tab-content ${index === 0 ? 'active' : ''}">
          <div class="card">
            <div class="card-header"><h3>Peta Utama (${web.toUpperCase()})</h3></div>
            <div class="input-group"><label>URL Gambar Peta Latar Belakang</label><input type="text" id="${web}_mainMap" class="input-main"></div>
          </div>
          <div class="card">
            <div class="card-header"><h3>Detail Zona Balap</h3></div>
            <div class="table-wrapper">
              <table>
                <thead><tr><th>Zone</th><th>Owner/Club</th><th>Logo Map URL</th><th>Track Map URL</th><th>Track Name</th><th>Length</th><th>Laps</th><th>Record Time</th><th>Cash Prize</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        </div>`;
      });
      document.getElementById('mainContainer').innerHTML = html;
    }

    // Fungsi Narik Data dari API pas web dibuka
    function loadData() {
      generateHTML();
      fetch(APPS_SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
          webList.forEach(web => {
            if(data[web] && data[web].length > 0) {
              // Isi Main Map
              document.getElementById(`${web}_mainMap`).value = data[web][0].MainMap || "";
              
              // Isi tabel zona
              data[web].forEach(row => {
                if(!row.Zone) return;
                const z = row.Zone;
                document.getElementById(`${web}_owner_${z}`).value = row.Owner || "";
                document.getElementById(`${web}_logoMap_${z}`).value = row.LogoMap || "";
                document.getElementById(`${web}_track_${z}`).value = row.Track || "";
                document.getElementById(`${web}_name_${z}`).value = row.Name || "";
                document.getElementById(`${web}_length_${z}`).value = row.Length || "";
                document.getElementById(`${web}_rounds_${z}`).value = row.Rounds || "";
                document.getElementById(`${web}_record_${z}`).value = row.Record || "";
                document.getElementById(`${web}_cash_${z}`).value = row.Cash || "";
              });
            }
          });
          document.getElementById('loader').style.display = 'none';
          showToast("Data tersinkronisasi dengan Database!");
        })
        .catch(err => {
          document.getElementById('loader').innerHTML = "<span style='color:red'>Gagal menarik data. Cek URL Google Apps Script!</span>";
        });
    }

    // Fungsi Ngirim Data Update (Ini yang kepotong sebelumnya)
    function simpanData() {
      const pin = document.getElementById('adminPin').value;
      if(!pin) { showToast("Masukkan PIN Admin!", "error"); return; }

      const btn = document.getElementById('btnUpdate');
      btn.innerText = "Menyimpan...";
      btn.style.pointerEvents = 'none';

      // Kumpulin data
      const payload = {
        pin: pin,
        sheet: activeTab.toUpperCase(),
        mainMap: document.getElementById(`${activeTab}_mainMap`).value,
        zones:[]
      };

      for(let i = 1; i <= 11; i++) {
        payload.zones.push({
          zone: i,
          owner: document.getElementById(`${activeTab}_owner_${i}`).value,
          logoMap: document.getElementById(`${activeTab}_logoMap_${i}`).value,
          track: document.getElementById(`${activeTab}_track_${i}`).value,
          name: document.getElementById(`${activeTab}_name_${i}`).value,
          length: document.getElementById(`${activeTab}_length_${i}`).value,
          rounds: document.getElementById(`${activeTab}_rounds_${i}`).value,
          record: document.getElementById(`${activeTab}_record_${i}`).value,
          cash: document.getElementById(`${activeTab}_cash_${i}`).value
        });
      }

      // Kirim Data pakai POST
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Penting biar ga kena CORS Error Google
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if(data.status === 'success') {
          showToast("Mantap! " + data.message);
          document.getElementById('adminPin').value = ''; // Kosongin PIN biar aman
        } else {
          showToast(data.message, "error"); // Muncul kalau PIN salah
        }
        btn.innerText = "Simpan Perubahan " + activeTab.toUpperCase();
        btn.style.pointerEvents = 'auto';
      })
      .catch(err => {
        showToast("Error jaringan saat update!", "error");
        btn.innerText = "Simpan Perubahan " + activeTab.toUpperCase();
        btn.style.pointerEvents = 'auto';
      });
    }

    async function simpanDataKeGitHub(dataBaru) {
  const token = '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'; 
  const owner = 'flxdrmaa';
  const repo = 'Street.NET';
  const path = 'data.json';

  // 1. Ambil SHA file dulu (syarat GitHub API)
  const getFile = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
    headers: { 'Authorization': `token ${token}` }
  });
  const fileData = await getFile.json();
  
  // 2. Kirim update (isi file harus di-encode ke Base64)
  const contentBase64 = btoa(JSON.stringify(dataBaru, null, 2));
  
  await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${token}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      message: "Update data dari Admin Panel",
      content: contentBase64,
      sha: fileData.sha // PENTING
    })
  });
  
  alert("Data berhasil diupdate ke GitHub!");
}

    // Jalankan loadData saat web dibuka
    window.onload = loadData;
  </script>
</body>
</html>
